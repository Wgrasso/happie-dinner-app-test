<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>S4 – Download CTA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @page { size: 405px 720px; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 405px; height: 720px; overflow: hidden; background: #D6CFC4; }
    .story {
      width: 405px; height: 720px;
      background: linear-gradient(168deg, #FEFCF8 0%, #F5EDE0 52%, #EAE0CE 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .blob-tr { position: absolute; top: -60px; right: -60px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(139,115,85,0.10) 0%, transparent 65%); pointer-events: none; }
    .blob-bl { position: absolute; bottom: -50px; left: -50px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(139,115,85,0.08) 0%, transparent 65%); pointer-events: none; }
    .frame { position: absolute; inset: 18px; border: 1px solid rgba(139,115,85,0.18); pointer-events: none; }
    .inner { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 40px; gap: 0; position: relative; z-index: 2; }
    .logo { width: 100px; height: 100px; object-fit: contain; margin-bottom: 18px; }
    .wordmark { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; color: #2D2D2D; letter-spacing: -0.5px; margin-bottom: 4px; }
    .sub-label { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #8B7355; margin-bottom: 24px; }
    .orn { color: #8B7355; opacity: 0.35; font-size: 16px; letter-spacing: 8px; margin-bottom: 20px; }
    .tagline { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; font-style: italic; color: #2D2D2D; line-height: 1.2; margin-bottom: 24px; }
    .tagline span { color: #8B7355; }
    .stars { display: flex; align-items: center; gap: 8px; margin-bottom: 26px; }
    .stars-i { color: #8B7355; font-size: 15px; letter-spacing: 2px; }
    .stars-t { font-family: 'Inter', sans-serif; font-size: 12px; color: #6B6B6B; font-weight: 500; }
    .cta-a { width: 280px; background: #8B7355; color: #FEFEFE; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; padding: 16px 0; border-radius: 100px; border: none; cursor: pointer; margin-bottom: 10px; }
    .cta-b { width: 280px; background: transparent; color: #8B7355; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; padding: 14px 0; border-radius: 100px; border: 2px solid rgba(139,115,85,0.32); cursor: pointer; margin-bottom: 14px; }
    .note { font-family: 'Inter', sans-serif; font-size: 11px; color: #6B6B6B; }
    .hint { font-family: 'Inter', sans-serif; font-size: 11px; color: #8B7355; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="story">
    <div class="blob-tr"></div>
    <div class="blob-bl"></div>
    <div class="frame"></div>
    <div class="inner">
      <img src="../../assets/icon.png" class="logo" alt="StudentenHapp">
      <div class="wordmark">StudentenHapp</div>
      <div class="sub-label">Voor studenten</div>
      <div class="orn">— * —</div>
      <p class="tagline">Samen eten,<br><span>makkelijk geregeld.</span></p>
      <div class="stars">
        <span class="stars-i">★★★★★</span>
        <span class="stars-t">Gratis te downloaden</span>
      </div>
      <button class="cta-a">Download voor iOS</button>
      <button class="cta-b">Download voor Android</button>
      <span class="note">Gratis · Geen advertenties · Voor studenten</span>
      <span class="hint">↑ swipe up</span>
    </div>
  </div>
</body>
</html>
