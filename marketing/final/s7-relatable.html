<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>S7 – Herkenbaar?</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @page { size: 405px 720px; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 405px; height: 720px; overflow: hidden; }
    .story {
      width: 405px; height: 720px;
      background: #232018;
      display: flex; flex-direction: column; position: relative; overflow: hidden;
    }
    .glow { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 340px; height: 280px; background: radial-gradient(ellipse, rgba(139,115,85,0.20) 0%, transparent 65%); pointer-events: none; }
    .content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 40px 24px; position: relative; z-index: 2; }
    .scene { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(139,115,85,0.65); margin-bottom: 22px; }
    .line { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 11px; }
    .name { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; color: #8B7355; min-width: 50px; padding-top: 2px; flex-shrink: 0; }
    .msg { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 400; line-height: 1.4; color: rgba(254,252,248,0.75); }
    .msg.dim { color: rgba(254,252,248,0.28); }
    .break { height: 1px; background: rgba(139,115,85,0.18); margin: 20px 0 16px; }
    .punch-lbl { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(139,115,85,0.65); margin-bottom: 10px; }
    .punch { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; font-style: italic; color: #FEFCF8; line-height: 1.18; }
    .punch span { color: #C4A882; }
    .bottom { padding: 0 40px 40px; display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 2; }
    .cta { background: #8B7355; color: #FEFEFE; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; padding: 16px 0; border-radius: 100px; border: none; cursor: pointer; text-align: center; }
    .hint { font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(139,115,85,0.65); font-weight: 500; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
  </style>
</head>
<body>
  <div class="story">
    <div class="glow"></div>
    <div class="content">
      <div class="scene">Elke dag, overal</div>
      <div class="line"><span class="name">Lisa</span><span class="msg">Wie kookt er vanavond?</span></div>
      <div class="line"><span class="name">Bas</span><span class="msg">Weet niet</span></div>
      <div class="line"><span class="name">Emma</span><span class="msg">Mij maakt het niet uit</span></div>
      <div class="line"><span class="name">Tom</span><span class="msg dim">...</span></div>
      <div class="line"><span class="name">Lisa</span><span class="msg">Iemand iets?</span></div>
      <div class="line"><span class="name">Bas</span><span class="msg dim">bestel gewoon wat</span></div>
      <div class="line"><span class="name">Emma</span><span class="msg dim">ok fine</span></div>
      <div class="line"><span class="name" style="opacity:.35">Tom</span><span class="msg dim">🍕</span></div>
      <div class="break"></div>
      <div class="punch-lbl">Herkenbaar?</div>
      <p class="punch">We hebben hier<br>een app <span>voor gemaakt.</span></p>
    </div>
    <div class="bottom">
      <div class="cta">Download StudentenHapp — gratis</div>
      <span class="hint">↑ swipe up</span>
    </div>
  </div>
</body>
</html>
