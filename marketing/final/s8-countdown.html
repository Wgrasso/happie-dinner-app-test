<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>S8 – Reageer voor het te laat is</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @page { size: 405px 720px; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 405px; height: 720px; overflow: hidden; }
    .story {
      width: 405px; height: 720px;
      background: #181510;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 380px; height: 360px; background: radial-gradient(ellipse, rgba(180,130,60,0.17) 0%, transparent 62%); pointer-events: none; }
    .inner { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 36px; position: relative; z-index: 2; gap: 0; }
    .food { width: 150px; height: 150px; object-fit: contain; margin-bottom: 22px; opacity: 0.88; }
    .eyebrow { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: rgba(180,130,60,0.75); margin-bottom: 12px; }
    .head { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 900; color: #FEFCF8; line-height: 1.02; letter-spacing: -1.2px; margin-bottom: 26px; }
    .head em { font-style: italic; color: #C4A882; }
    .timer-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(180,130,60,0.20); border-radius: 18px; padding: 20px 32px; margin-bottom: 22px; width: 260px; }
    .t-lbl { font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(254,252,248,0.25); margin-bottom: 8px; }
    .t-val { font-family: 'Courier New', monospace; font-size: 50px; font-weight: 700; color: #C4A882; letter-spacing: 2px; line-height: 1.0; }
    .t-sub { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(196,168,130,0.45); margin-top: 6px; }
    .body { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 400; line-height: 1.7; color: rgba(254,252,248,0.48); max-width: 270px; margin-bottom: 28px; }
    .body strong { color: rgba(254,252,248,0.78); font-weight: 600; }
    .cta { width: 280px; background: #8B7355; color: #FEFEFE; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; padding: 16px 0; border-radius: 100px; border: none; cursor: pointer; margin-bottom: 12px; }
    .hint { font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(139,115,85,0.6); font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="story">
    <div class="glow"></div>
    <div class="inner">
      <img src="../../assets/drawing8.png" class="food" alt="">
      <span class="eyebrow">Deadline</span>
      <h1 class="head">Reageer voor<br><em>het te laat is.</em></h1>
      <div class="timer-box">
        <div class="t-lbl">Tijd over</div>
        <div class="t-val">01:47</div>
        <div class="t-sub">remaining</div>
      </div>
      <p class="body">Elke dinner request heeft een <strong>afteltimer</strong>. Geen antwoord = gemist.</p>
      <button class="cta">Download gratis — StudentenHapp</button>
      <span class="hint">↑ swipe up</span>
    </div>
  </div>
</body>
</html>
