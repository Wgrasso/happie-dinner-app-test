<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join groep op Happie</title>

  <!-- WhatsApp / social preview -->
  <meta property="og:title" content="Je bent uitgenodigd voor een groep op Happie!">
  <meta property="og:description" content="Open de link om automatisch lid te worden. Samen eten plannen was nog nooit zo makkelijk.">
  <meta property="og:image" content="https://studentenhappie.nl/assets/nieuw_logo_studentenhappie.webp">
  <meta property="og:url" content="https://studentenhappie.nl/join/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#8B7355">
  <link rel="icon" type="image/png" href="/assets/favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F2EE;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #2D2D2D;
    }
    .card {
      background: #FDFCFA;
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 48px rgba(139, 115, 85, 0.12);
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #2D2D2D;
    }
    .subtitle {
      font-size: 15px;
      color: #8B8580;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .code-section {
      background: #F5F2EE;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid #E8E2DA;
    }
    .code-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8B7355;
      margin-bottom: 8px;
    }
    .code-value {
      font-family: 'Inter', monospace;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #2D2D2D;
      user-select: all;
      -webkit-user-select: all;
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px 18px;
      border: 1.5px solid #E8E2DA;
      border-radius: 10px;
      background: #FFF;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #8B7355;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:active { transform: scale(0.96); }
    .copy-btn.copied {
      background: #8B7355;
      color: #FFF;
      border-color: #8B7355;
    }
    .copy-btn svg { width: 16px; height: 16px; }
    .main-btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: #8B7355;
      color: #FFF;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      box-shadow: 0 4px 12px rgba(139, 115, 85, 0.25);
    }
    .main-btn:hover { background: #7A6548; }
    .main-btn:active { transform: scale(0.98); }
    .store-link {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      color: #8B8580;
      text-decoration: none;
    }
    .store-link:hover { text-decoration: underline; }
    .steps {
      text-align: left;
      margin: 20px 0 24px;
      padding: 0;
      list-style: none;
      counter-reset: step;
    }
    .steps li {
      counter-increment: step;
      position: relative;
      padding-left: 36px;
      margin-bottom: 14px;
      font-size: 14px;
      line-height: 1.5;
      color: #4A4540;
    }
    .steps li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 0;
      width: 24px;
      height: 24px;
      border-radius: 12px;
      background: #F0EDE8;
      color: #8B7355;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .steps li strong { color: #2D2D2D; }
    .divider {
      height: 1px;
      background: #E8E2DA;
      margin: 20px 0;
    }
    .no-app-text {
      font-size: 13px;
      color: #8B8580;
      margin-top: 16px;
      line-height: 1.5;
    }

    /* Loading/redirect state */
    .redirect-msg {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #EBF5EC;
      font-size: 13px;
      color: #3D7A4A;
      font-weight: 500;
    }
    .redirect-msg.show { display: block; }
  </style>
</head>
<body>

<div class="card">
  <img src="/assets/nieuw_logo_studentenhappie.webp" alt="Happie" class="logo">
  <h1>Je bent uitgenodigd!</h1>
  <p class="subtitle">Iemand wil samen met jou eten plannen op Happie.</p>

  <div class="code-section">
    <div class="code-label">Groepscode</div>
    <div class="code-value" id="joinCode">---</div>
    <button class="copy-btn" id="copyBtn" onclick="copyCode()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span id="copyText">Kopieer code</span>
    </button>
  </div>

  <a class="main-btn" id="openAppBtn" href="#">
    Open in Happie
  </a>

  <div class="divider"></div>

  <p class="no-app-text"><strong>Heb je de app nog niet?</strong></p>
  <ol class="steps">
    <li><strong>Download Happie</strong> uit de App Store</li>
    <li>Open de app en tik op <strong>"Groep Joinen"</strong></li>
    <li>Kopieer de code hierboven en <strong>plak hem in</strong></li>
  </ol>

  <a class="main-btn" id="storeBtn" href="https://apps.apple.com/app/happie/id6757129676" style="background: #000;">
    Download in de App Store
  </a>

  <div class="redirect-msg" id="redirectMsg">
    App wordt geopend...
  </div>
</div>

<script>
  // Extract join code. Primary: ?code=ABCD1234 query string (works on
  // every static host). Fallback: /join/ABCD1234 path (requires server
  // wildcard routing; kept for older invites already out there).
  const params = new URLSearchParams(window.location.search);
  let code = (params.get('code') || params.get('c') || '').trim().toUpperCase();
  if (!code) {
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const codeIndex = pathParts.indexOf('join');
    if (codeIndex !== -1 && pathParts[codeIndex + 1]) {
      code = pathParts[codeIndex + 1].toUpperCase();
    }
  }
  if (!code) code = null;

  const codeEl = document.getElementById('joinCode');
  const openBtn = document.getElementById('openAppBtn');
  const redirectMsg = document.getElementById('redirectMsg');

  if (code) {
    codeEl.textContent = code;

    // Deep link to the app
    const deepLink = 'happie://join/' + code;
    const universalLink = 'https://studentenhappie.nl/join/?code=' + encodeURIComponent(code);

    // "Open in Happie" button tries the deep link
    openBtn.href = deepLink;
    openBtn.addEventListener('click', function(e) {
      e.preventDefault();
      redirectMsg.classList.add('show');

      // Try universal link first (iOS handles this natively)
      window.location.href = deepLink;

      // If app doesn't open within 1.5s, go to App Store
      setTimeout(function() {
        // Check if page is still visible (if app opened, page is hidden)
        if (!document.hidden) {
          window.location.href = 'https://apps.apple.com/app/happie/id6757129676';
        }
      }, 1500);
    });

    // Update OG URL to include code
    const ogUrl = document.querySelector('meta[property="og:url"]');
    if (ogUrl) ogUrl.setAttribute('content', universalLink);
  } else {
    codeEl.textContent = '---';
    openBtn.style.display = 'none';
  }

  function copyCode() {
    if (!code) return;
    const btn = document.getElementById('copyBtn');
    const txt = document.getElementById('copyText');

    navigator.clipboard.writeText(code).then(function() {
      txt.textContent = 'Gekopieerd!';
      btn.classList.add('copied');
      setTimeout(function() {
        txt.textContent = 'Kopieer code';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(function() {
      // Fallback: select the code text
      const range = document.createRange();
      range.selectNode(codeEl);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });
  }

  // Auto-try opening the app on page load (mobile only)
  if (code && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    setTimeout(function() {
      window.location.href = 'happie://join/' + code;
      // Fallback to App Store if app not installed
      setTimeout(function() {
        if (!document.hidden) {
          window.location.href = 'https://apps.apple.com/app/happie/id6757129676';
        }
      }, 1500);
    }, 300);
  }
</script>

</body>
</html>
